name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  chart-components-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ChartComponents
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ChartComponents/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  demo-app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DemoApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DemoApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
